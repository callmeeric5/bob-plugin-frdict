name: Build Bob Plugin

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Plugin
        run: node build.js

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bobplugin
          path: release/*.bobplugin

      - name: Upload Appcast Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: bobplugin
          path: release

      - name: Download Appcast
        uses: actions/download-artifact@v4
        with:
          name: appcast
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.bobplugin

      - name: Upload Appcast
        uses: softprops/action-gh-release@v2
        with:
          files: appcast.json
