name: Build Bob Plugin

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Plugin
        run: node build.js

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-assets
          path: |
            release/*.bobplugin
            appcast.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-assets
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.bobplugin
            dist/appcast.json
